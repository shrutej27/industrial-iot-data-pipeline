apiVersion: 1

groups:
  - orgId: 1
    name: IoT Sensor Alerts
    folder: IoT Pipeline
    interval: 30s
    rules:
      - uid: temp-warning
        title: Temperature Warning (>85°C)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: influxdb
            model:
              refId: A
              query: |
                from(bucket: "iot")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r._measurement == "sensor_readings")
                  |> filter(fn: (r) => r.metric == "temperature")
                  |> filter(fn: (r) => r._field == "value")
                  |> last()
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [85]
        for: 30s
        labels:
          severity: warning
          metric: temperature
        annotations:
          summary: "Temperature exceeds 85°C warning threshold"

      - uid: temp-critical
        title: Temperature Critical (>95°C)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: influxdb
            model:
              refId: A
              query: |
                from(bucket: "iot")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r._measurement == "sensor_readings")
                  |> filter(fn: (r) => r.metric == "temperature")
                  |> filter(fn: (r) => r._field == "value")
                  |> last()
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [95]
        for: 30s
        labels:
          severity: critical
          metric: temperature
        annotations:
          summary: "Temperature exceeds 95°C critical threshold"

      - uid: rpm-out-of-range
        title: RPM Out of Range (1000–2000)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: influxdb
            model:
              refId: A
              query: |
                from(bucket: "iot")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r._measurement == "sensor_readings")
                  |> filter(fn: (r) => r.metric == "rpm")
                  |> filter(fn: (r) => r._field == "value")
                  |> last()
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator:
                    type: outside_range
                    params: [1000, 2000]
        for: 30s
        labels:
          severity: warning
          metric: rpm
        annotations:
          summary: "RPM outside safe range 1000–2000"

      - uid: pressure-high
        title: Pressure High (>4.0 bar)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: influxdb
            model:
              refId: A
              query: |
                from(bucket: "iot")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r._measurement == "sensor_readings")
                  |> filter(fn: (r) => r.metric == "pressure")
                  |> filter(fn: (r) => r._field == "value")
                  |> last()
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [4.0]
        for: 30s
        labels:
          severity: warning
          metric: pressure
        annotations:
          summary: "Pressure exceeds 4.0 bar threshold"

contactPoints:
  - orgId: 1
    name: FastAPI Webhook
    receivers:
      - uid: fastapi-webhook
        type: webhook
        settings:
          url: http://api:8000/webhooks/grafana-alert
          httpMethod: POST
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: FastAPI Webhook
    group_by: ["alertname", "machine_id"]
    group_wait: 10s
    group_interval: 1m
    repeat_interval: 4h
